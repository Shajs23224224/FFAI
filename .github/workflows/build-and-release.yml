name: Build FFAI APK

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Tipo de build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  ANDROID_API_LEVEL: '34'
  BUILD_TOOLS_VERSION: '34.0.0'
  NDK_VERSION: '25.2.9519653'
  CMAKE_VERSION: '3.22.1'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-${{ env.ANDROID_API_LEVEL }} build-tools;${{ env.BUILD_TOOLS_VERSION }} ndk;${{ env.NDK_VERSION }} cmake;${{ env.CMAKE_VERSION }}'

      # Optimized caching with hash-based keys
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/native
            ~/.konan
            ./.build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
            ${{ runner.os }}-gradle-

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download ML Models
        run: |
          mkdir -p app/src/main/assets/models
          # Download model files if not present
          if [ ! -f "app/src/main/assets/models/object_detector.tflite" ]; then
            echo "Models should be committed to LFS or downloaded from secure storage"
            # Placeholder: In production, download from secure model registry
            # aws s3 cp s3://ffai-models/ app/src/main/assets/models/ --recursive
          fi

      # Run tests and lint in parallel steps for faster feedback
      - name: Run Unit Tests with Coverage
        run: ./gradlew testDebugUnitTest jacocoTestReport --stacktrace

      - name: Run Android Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Build Debug APK
        if: github.event.inputs.release_type != 'release' && !startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleDebug --stacktrace --build-cache
        env:
          SIGNING_ENABLED: 'false'

      - name: Decode Keystore
        if: github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/v')
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ENCODED_KEYSTORE" ]; then
            echo "Error: KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$ENCODED_KEYSTORE" | base64 -d > ffai.keystore
          ls -lh ffai.keystore

      - name: Set Version Code
        if: github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/v')
        id: version
        run: |
          # Version code from tag (v1.2.3 -> 10203) or default
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION_TAG=${GITHUB_REF#refs/tags/v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_TAG"
            VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          else
            VERSION_TAG="1.0.0-manual"
            VERSION_CODE=1
          fi
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "APK_VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "📱 Building version $VERSION_TAG (code: $VERSION_CODE)"

      - name: Build Release APK
        if: github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ ! -f "ffai.keystore" ]; then
            echo "Error: Keystore file not found"
            exit 1
          fi
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/ffai.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --stacktrace --build-cache

      - name: Verify APK
        run: |
          APK_PATH=""
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          elif [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            APK_PATH="app/build/outputs/apk/release/app-release.apk"
          fi
          
          if [ -n "$APK_PATH" ]; then
            echo "✅ APK found: $APK_PATH"
            ls -lh $APK_PATH
            file $APK_PATH
            
            # APK Analysis
            echo ""
            echo "📊 APK Analysis:"
            echo "- Size: $(du -h $APK_PATH | cut -f1)"
            echo "- Contains:"
            unzip -l $APK_PATH | tail -1 | awk '{print "  - " $1 " files, " $2 " bytes uncompressed"}'
            
            # Verify signing for release builds
            if [[ $APK_PATH == *"release"* ]]; then
              echo ""
              echo "🔏 Verifying APK signature..."
              if jarsigner -verify -verbose -certs $APK_PATH 2>&1 | grep -q "jar verified"; then
                echo "✅ APK is properly signed"
              else
                echo "⚠️ APK signature verification inconclusive"
              fi
            fi
          else
            echo "❌ Error: No APK found"
            exit 1
          fi

      - name: Upload Debug APK
        if: github.event.inputs.release_type != 'release' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ffai-debug-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/reports/jacoco/
          retention-days: 30
          compression-level: 6
          if-no-files-found: error

      - name: Upload Release APK
        if: github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ffai-release-apk
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
          compression-level: 6
          if-no-files-found: error

      - name: Generate Release Notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Generate structured release notes
          cat > release_notes.txt << EOF
          # FFAI Release $VERSION
          
          ## 📱 APK Information
          - **Version:** $VERSION
          - **Version Code:** ${{ env.APK_VERSION_CODE }}
          - **Build Date:** $(date -u +"%Y-%m-%d %H:%M UTC")
          
          ## 📝 Changes
          EOF
          
          # Add commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "" >> release_notes.txt
            git log --oneline --no-decorate ${PREV_TAG}..HEAD >> release_notes.txt || true
          else
            echo "Initial release" >> release_notes.txt
          fi
          
          cat >> release_notes.txt << EOF
          
          ## 🔧 Build Configuration
          - Target SDK: ${{ env.ANDROID_API_LEVEL }}
          - NDK: ${{ env.NDK_VERSION }}
          - Java: ${{ env.JAVA_VERSION }}
          
          ## 📋 Installation
          1. Download the APK below
          2. Enable "Unknown Sources" in Android settings
          3. Install the APK
          4. Grant Accessibility permissions when prompted
          EOF

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          name: FFAI ${{ steps.release_notes.outputs.version }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/mapping/release/mapping.txt
          body_path: release_notes.txt
          generate_release_notes: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          fail_on_unmatched_files: true
          discussion_category_name: announcements
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
