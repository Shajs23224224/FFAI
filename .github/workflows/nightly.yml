name: Nightly Build & Test

on:
  schedule:
    # Run at 2:00 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_API_LEVEL: '34'
  BUILD_TOOLS_VERSION: '34.0.0'
  NDK_VERSION: '25.2.9519653'
  CMAKE_VERSION: '3.22.1'

jobs:
  # Full test suite on multiple API levels
  instrumentation-tests:
    name: Instrumented Tests
    runs-on: macos-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        api-level: [29, 31, 34]
        target: [google_apis]
        arch: [x86_64, arm64-v8a]
        exclude:
          # Reduce matrix size - test arm64 only on API 34
          - api-level: 29
            arch: arm64-v8a
          - api-level: 31
            arch: arm64-v8a
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-${{ matrix.api-level }} ndk;${{ env.NDK_VERSION }}'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-nightly-${{ hashFiles('**/*.gradle*') }}

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.arch }}-${{ github.run_id }}
          restore-keys: |
            avd-${{ matrix.api-level }}-${{ matrix.arch }}-

      - name: Create AVD and generate snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "Generated AVD snapshot for API ${{ matrix.api-level }} ${{ matrix.arch }}"

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            ./gradlew connectedCheck --stacktrace \
              -Pandroid.testInstrumentationRunnerArguments.class=.*Test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}-${{ matrix.arch }}
          path: |
            app/build/outputs/androidTest-results/
            app/build/reports/androidTests/
          retention-days: 14

  # Build performance monitoring
  build-performance:
    name: Build Performance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-${{ env.ANDROID_API_LEVEL }} build-tools;${{ env.BUILD_TOOLS_VERSION }} ndk;${{ env.NDK_VERSION }}'

      - name: Clean Build Cache
        run: |
          rm -rf ~/.gradle/caches/build-cache-1
          ./gradlew clean

      - name: Measure Clean Build Time
        run: |
          echo "⏱️ Measuring clean build time..."
          START_TIME=$(date +%s)
          ./gradlew assembleDebug --build-cache --profile
          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          echo "Clean build took ${BUILD_TIME} seconds"

      - name: Measure Incremental Build Time
        run: |
          echo "⏱️ Measuring incremental build time..."
          # Make a small change
          echo "// Nightly build test" >> app/src/main/java/com/ffai/MainActivity.kt
          START_TIME=$(date +%s)
          ./gradlew assembleDebug --build-cache
          END_TIME=$(date +%s)
          INCREMENTAL_TIME=$((END_TIME - START_TIME))
          echo "INCREMENTAL_TIME=$INCREMENTAL_TIME" >> $GITHUB_ENV
          echo "Incremental build took ${INCREMENTAL_TIME} seconds"

      - name: Generate Performance Report
        run: |
          cat > build_performance.md << EOF
          # Nightly Build Performance Report
          
          **Date:** $(date -u +"%Y-%m-%d %H:%M UTC")
          **Commit:** ${{ github.sha }}
          
          ## Build Times
          - Clean Build: ${{ env.BUILD_TIME }} seconds
          - Incremental Build: ${{ env.INCREMENTAL_TIME }} seconds
          
          ## Thresholds
          - Clean Build should be < 600 seconds
          - Incremental Build should be < 60 seconds
          
          ## Status
          EOF
          
          CLEAN_STATUS="✅"
          INCREMENTAL_STATUS="✅"
          
          if [ ${{ env.BUILD_TIME }} -gt 600 ]; then
            CLEAN_STATUS="⚠️"
          fi
          
          if [ ${{ env.INCREMENTAL_TIME }} -gt 60 ]; then
            INCREMENTAL_STATUS="⚠️"
          fi
          
          echo "- Clean Build: $CLEAN_STATUS" >> build_performance.md
          echo "- Incremental Build: $INCREMENTAL_STATUS" >> build_performance.md
          
          cat build_performance.md

      - name: Upload Performance Report
        uses: actions/upload-artifact@v4
        with:
          name: build-performance-report
          path: build_performance.md
          retention-days: 30

  # Full code quality analysis
  code-quality:
    name: Deep Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-${{ env.ANDROID_API_LEVEL }}'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-quality-${{ hashFiles('**/*.gradle*') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Full Analysis
        run: |
          ./gradlew 
            testDebugUnitTest \
            jacocoTestReport \
            lintDebug \
            detekt \
            --stacktrace

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            app/build/reports/jacoco/
            app/build/reports/lint-results-debug.html
            build/reports/detekt/
          retention-days: 30

  # Security scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'FFAI-Nightly'
          path: '.'
          format: 'ALL'

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: reports/
          retention-days: 30

  # Nightly build summary
  nightly-summary:
    name: Nightly Summary
    runs-on: ubuntu-latest
    needs: [instrumentation-tests, build-performance, code-quality, security-scan]
    if: always()
    
    steps:
      - name: Generate Summary
        run: |
          echo "# 🌙 Nightly Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.instrumentation-tests.result }}" == "success" ]; then
            echo "✅ Instrumented Tests (Multiple API levels)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Instrumented Tests" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.build-performance.result }}" == "success" ]; then
            echo "✅ Build Performance" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build Performance" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.code-quality.result }}" == "success" ]; then
            echo "✅ Code Quality Analysis" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Code Quality Analysis" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "✅ Security Scan" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Security Scan" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Artifacts are available for 30 days" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '❌ Nightly build failed! Check the logs for details.'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
