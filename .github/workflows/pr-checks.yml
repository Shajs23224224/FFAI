name: PR Checks

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.kt'
      - '**.java'
      - '**.gradle'
      - '**.xml'
      - '**.yml'
      - '**.properties'

env:
  JAVA_VERSION: '17'
  ANDROID_API_LEVEL: '34'

jobs:
  # Fast checks that run in parallel
  ktlint:
    name: Code Style (ktlint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run ktlint
        uses: ScaCap/action-ktlint@master
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          android: true

  detekt:
    name: Static Analysis (Detekt)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-pr-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-pr-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Detekt
        run: ./gradlew detekt --stacktrace
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: success() || failure()
        with:
          sarif_file: build/reports/detekt/detekt.sarif

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-test-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-test-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            app/build/test-results/
            app/build/reports/tests/
          retention-days: 7

  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-${{ env.ANDROID_API_LEVEL }}'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-lint-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-lint-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Upload Lint Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  # Check for security vulnerabilities in dependencies
  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'FFAI'
          path: '.'
          format: 'ALL'
          args: >
            --enableRetired
            --enableExperimental

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 7

  # Build validation - ensures the PR doesn't break the build
  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-${{ env.ANDROID_API_LEVEL }}'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-build-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-build-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --build-cache
        env:
          SIGNING_ENABLED: 'false'

      - name: Verify Build
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ Debug build successful"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "❌ Build failed - no APK found"
            exit 1
          fi

  # Summary job that depends on all other checks
  pr-checks-summary:
    name: PR Checks Summary
    runs-on: ubuntu-latest
    needs: [ktlint, detekt, unit-tests, android-lint, dependency-check, build-validation]
    if: always()
    
    steps:
      - name: Check Results
        run: |
          echo "## PR Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          RESULTS=(
            "${{ needs.ktlint.result }}|Code Style (ktlint)"
            "${{ needs.detekt.result }}|Static Analysis (Detekt)"
            "${{ needs.unit-tests.result }}|Unit Tests"
            "${{ needs.android-lint.result }}|Android Lint"
            "${{ needs.dependency-check.result }}|Dependency Security"
            "${{ needs.build-validation.result }}|Build Validation"
          )
          
          ALL_PASSED=true
          for result in "${RESULTS[@]}"; do
            IFS='|' read -r status name <<< "$result"
            if [ "$status" == "success" ]; then
              echo "✅ $name" >> $GITHUB_STEP_SUMMARY
            elif [ "$status" == "skipped" ]; then
              echo "⏭️ $name (skipped)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $name" >> $GITHUB_STEP_SUMMARY
              ALL_PASSED=false
            fi
          done
          
          if [ "$ALL_PASSED" = true ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 All checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Some checks failed. Please review the details above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
