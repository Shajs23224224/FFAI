name: PR Checks

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.kt'
      - '**.java'
      - '**.gradle'
      - '**.xml'
      - '**.yml'
      - '**.properties'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_API_LEVEL: '34'
  BUILD_TOOLS_VERSION: '34.0.0'

jobs:
  # Essential checks - Build must pass
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-${{ env.ANDROID_API_LEVEL }} build-tools;${{ env.BUILD_TOOLS_VERSION }}'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew testDebugUnitTest --stacktrace
        continue-on-error: true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          SIGNING_ENABLED: 'false'

      - name: Verify Build
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ Debug build successful"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
            echo ""
            echo "📊 APK Info:"
            unzip -l app/build/outputs/apk/debug/app-debug.apk | tail -5
          else
            echo "❌ Build failed - no APK found"
            exit 1
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-build-artifacts
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/test-results/
          retention-days: 7
          if-no-files-found: warn
